name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create (e.g. v0.0.1)'
        required: true
        type: string
      ref:
        description: 'Branch or ref to release from (tag need not exist yet)'
        required: false
        default: 'main'
        type: string

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install VHS and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd
          go install github.com/charmbracelet/vhs@latest
          vhs --version

      - name: Generate screenshots
        run: make screenshots

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/

  release:
    needs: screenshots
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Download screenshots
        uses: actions/download-artifact@v4
        with:
          name: screenshots
          path: screenshots/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            screenshots/*.gif
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  commit_screenshots:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || 'main' }}

      - name: Download screenshots
        uses: actions/download-artifact@v4
        with:
          name: screenshots
          path: screenshots/

      - name: Configure Git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Commit and push screenshots
        run: |
          git add screenshots/
          if git diff --staged --quiet; then
            echo "No screenshot changes."
            exit 0
          fi
          git commit -m "chore: update screenshots [skip ci]"
          for i in 1 2 3; do
            if git push origin HEAD; then echo "Pushed screenshots"; exit 0; fi
            git pull --rebase origin HEAD
          done
          echo "Push failed; screenshots are in the release."
          exit 0
